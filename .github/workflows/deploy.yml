name: Deploy Atlas AI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/ubuntu/all_bots/atlas-ai

    steps:
      - name: Pull latest code
        run: |
          sudo git config --global --add safe.directory /home/ubuntu/all_bots/atlas-ai
          sudo git -C /home/ubuntu/all_bots/atlas-ai pull origin main

      - name: Deploy with Docker Compose
        run: |
          sudo docker compose -f /home/ubuntu/all_bots/atlas-ai/docker-compose.yml down --remove-orphans
          sudo docker compose -f /home/ubuntu/all_bots/atlas-ai/docker-compose.yml up --build -d

      - name: Health check
        run: |
          sleep 15
          curl -f http://localhost:9734/health || exit 1
          echo "API healthy"

      - name: Prune old images
        run: sudo docker image prune -f
