name: Deploy Atlas AI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/ubuntu/all_bots/atlas-ai

    steps:
      - name: Pull latest code
        run: |
          sudo git config --global --add safe.directory /home/ubuntu/all_bots/atlas-ai
          sudo git -C /home/ubuntu/all_bots/atlas-ai pull origin main

      - name: Deploy with Docker Compose
        run: |
          sudo docker compose -f /home/ubuntu/all_bots/atlas-ai/docker-compose.yml down --remove-orphans
          sudo docker compose -f /home/ubuntu/all_bots/atlas-ai/docker-compose.yml up --build -d --wait

      - name: Debug container status
        run: |
          sudo docker compose -f /home/ubuntu/all_bots/atlas-ai/docker-compose.yml ps
          sudo docker compose -f /home/ubuntu/all_bots/atlas-ai/docker-compose.yml logs --tail 30 atlas-api

      - name: Health check
        run: |
          for i in 1 2 3 4 5; do
            curl -sf http://localhost:9734/health && echo "API healthy" && exit 0
            sleep 5
          done
          echo "API failed to start" && exit 1

      - name: Prune old images
        run: sudo docker image prune -f
