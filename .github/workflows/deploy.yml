name: Deploy Atlas AI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/ubuntu/all_bots/atlas-ai

    steps:
      - name: Pull latest code
        run: |
          git pull origin main

      - name: Deploy with Docker Compose
        run: |
          docker compose down --remove-orphans
          docker compose up --build -d

      - name: Health check
        run: |
          sleep 15
          curl -f http://localhost:9734/health || exit 1
          echo "API healthy"

      - name: Prune old images
        run: docker image prune -f
